name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: LSP/type diagnostics
        run: pnpm run lsp

      - name: Lint
        run: pnpm run lint

      - name: Full build
        run: pnpm run build
