name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: LSP/type diagnostics
        run: npm run lsp

      - name: Lint
        run: npm run lint

      - name: Full build
        run: npm run build
